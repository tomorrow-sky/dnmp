# 至少需要一个 Hyperf 节点，多个配置多行
upstream hyperf {
    # Hyperf HTTP Server 的 IP 及 端口
    server 127.0.0.1:9501;
}

upstream message {
    # Hyperf HTTP Server 的 IP 及 端口
    server 127.0.0.1:9502;
}

server {
  listen 80;

  server_name demo.mine.com;
  root  /data/www/MineAdmin/mine-ui/dist;
  index index.php index.html index.htm;

  location /uploadfile/ {
       root /data/www/MineAdmin/public;
  }

  location ~ /images/ {
       root /data/www/MineAdmin/public;
  }

  location ~* ^/(css|img|js|flv|swf|download)/(.+)$ {
  }

  location ~ /\.ht {
      deny all;
  }

   # PHP 代理
    location /api/ {
        # 将客户端的 Host 和 IP 信息一并转发到对应节点
        proxy_set_header Host $http;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 将协议架构转发到对应节点，如果使用非https请改为http
        proxy_set_header X-scheme http;

        # 执行代理访问真实服务器
        proxy_pass http://hyperf/;
    }

  location /message/ {
        # WebSocket Header
        proxy_http_version 1.1;
        proxy_set_header Upgrade websocket;
        proxy_set_header Connection "Upgrade";

        # 将客户端的 Host 和 IP 信息一并转发到对应节点
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;

        # 客户端与服务端无交互 60s 后自动断开连接，请根据实际业务场景设置
        proxy_read_timeout 60s ;

        # 执行代理访问真实服务器
        proxy_pass http://message/;
	}

}